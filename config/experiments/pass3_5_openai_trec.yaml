# Pass 3.5 A0 validation: OpenAI-only TREC, 4 bins, single budget [1.0].
# Small, rate-limit-friendly run with no KV compression (budget 1.0 only).
#
# Usage (uv):
#   uv run python -m kv_transition all -c config/experiments/pass3_5_openai_trec.yaml

dataset:
  name: longbench
  task: trec
  n_per_bin: 6
  seed: 1337

binning:
  n_bins: 4

kv:
  policy: none
  budgets: [1.0]

decoding:
  temperature: 0
  max_tokens: 128

output:
  exp_group_id: pass3_5_openai_trec_v1

db:
  path: auto


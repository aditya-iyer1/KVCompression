# Pass 4 pinned experiment: LongBench NarrativeQA, 4 length bins, KV budgets [1.0, 0.2].
# 32 requests per budget (4 bins × 8). Deterministic sampling (temperature=0, seed).
#
# Usage (uv):
#   uv run python -m kv_transition all -c config/experiments/pass4_narrativeqa_4bins.yaml

dataset:
  name: longbench
  task: narrativeqa
  seed: 1337
  n_per_bin: 8

binning:
  n_bins: 4

model:
  name: ${MODEL_NAME}
  # Exceeds longest-bin prompt token length + max_tokens (128) + runner safety buffer (256).
  max_model_len: 65536

engine:
  name: openai_compat
  base_url: ${BASE_URL}
  api_key_env: OPENAI_API_KEY
  request:
    timeout_s: 120
    extra_body:
      kv_budget: "{kv_budget}"
      # kv_policy: "{kv.policy}"

kv:
  policy: snapkv
  budgets: [1.0, 0.2]

decoding:
  temperature: 0
  max_tokens: 128

analysis:
  seed: 1337

output:
  exp_group_id: pass4_longbench_narrativeqa_4bins_v1

db:
  path: auto

